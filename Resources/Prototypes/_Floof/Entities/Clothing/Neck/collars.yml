    sprite: _Floof/Clothing/Neck/Collars/Alternative/bell.rsi
  - type: Clothing
    sprite: _Floof/Clothing/Neck/Collars/Alternative/bell.rsi
  - type: EmitsSoundOnMove
    soundCollection:
      collection: FootstepJester
      params:
        volume: -5

